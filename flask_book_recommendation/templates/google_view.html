{% extends "base.html" %}

{% block title %}External Node | {{ title }} | The Digital Curator{% endblock %}

{% block content %}
<main class="min-h-screen bg-surface pt-32 lg:pt-48 pb-48 px-8 lg:px-24">
    <div class="max-w-screen-2xl mx-auto space-y-16">
        
        <!-- Reader Header -->
        <header class="flex flex-col md:flex-row items-center justify-between pb-12 border-b border-on-surface/10 gap-12">
            <div class="flex items-center gap-8 w-full md:w-auto">
                <a href="{{ url_for('public.list_books') }}" class="w-16 h-16 bg-surface-container-high flex items-center justify-center text-on-surface/40 hover:text-primary transition-all shadow-2xl group">
                    <span class="material-symbols-outlined group-hover:translate-x-2 transition-transform">arrow_forward</span>
                </a>
                <div class="space-y-2">
                    <span class="font-label text-xs uppercase tracking-[0.4em] text-primary">External Synchronization</span>
                    <h1 class="font-headline text-4xl lg:text-5xl font-black text-on-surface tracking-tighter">{{ title or "Unidentified Volume" }}</h1>
                </div>
            </div>

            <a href="https://books.google.com/books?id={{ google_id }}" target="_blank" rel="noopener" class="w-full md:w-auto bg-on-surface text-white px-10 py-5 font-headline font-black text-xs uppercase tracking-widest shadow-2xl hover:bg-primary transition-all flex items-center justify-center gap-6 group">
                Independent Node Access 
                <span class="material-symbols-outlined text-sm group-hover:rotate-45 transition-transform">open_in_new</span>
            </a>
        </header>

        <!-- The Frame -->
        <div class="space-y-12">
            <div class="bg-surface-container-high p-4 lg:p-12 shadow-[0_100px_200px_-50px_rgba(0,0,0,0.1)] relative">
                <div class="absolute inset-0 border-[32px] border-on-surface/[0.01] pointer-events-none"></div>
                <div class="aspect-[16/10] bg-surface relative shadow-2xl overflow-hidden">
                    <iframe src="https://books.google.com/books?id={{ google_id }}&printsec=frontcover&output=embed" title="{{ title }}" loading="lazy" class="w-full h-full border-0 grayscale-[0.2] hover:grayscale-0 transition-all duration-700"></iframe>
                </div>
            </div>
            
            <footer class="flex items-center justify-center">
                <div class="bg-surface-container-low px-8 py-4 border border-on-surface/5 flex items-center gap-6 shadow-2xl">
                    <span class="w-2 h-2 bg-primary rounded-full animate-pulse shadow-[0_0_10px_rgba(160,65,0,0.5)]"></span>
                    <span class="font-label text-[10px] uppercase font-black text-on-surface/30 tracking-[0.4em]">Integrated Telemetry Stream Active</span>
                </div>
            </footer>
        </div>
    </div>
</main>
{% endblock %}
